name = "qpilot-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.png", "**/*.ico"]
fallthrough = true

[vars]
LLM_PROVIDER = "groq"
GROQ_MODEL = "llama-3.3-70b-versatile"
GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions"
CACHE_TTL_SECONDS = "86400"
RATE_LIMIT_MAX = "1000"
RATE_LIMIT_WINDOW_SECONDS = "60"
MAX_QUESTIONS_PER_CACHE = "200"
MAX_EXCLUSION_LIST_SIZE = "50"
MAX_LIMIT = "50"

[[kv_namespaces]]
binding = "QA_CACHE"
id = "preview_id_only"
preview_id = "preview_id_only"

[env.production]
name = "qpilot-api-prod"
routes = [{ pattern = "api.qpilot.cbsdev.me", custom_domain = true }]

[env.production.vars]
LLM_PROVIDER = "groq"
GROQ_MODEL = "llama-3.3-70b-versatile"
GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions"
CACHE_TTL_SECONDS = "86400"
RATE_LIMIT_MAX = "20"
RATE_LIMIT_WINDOW_SECONDS = "60"
MAX_QUESTIONS_PER_CACHE = "200"
MAX_EXCLUSION_LIST_SIZE = "50"
MAX_LIMIT = "50"

[[env.production.kv_namespaces]]
binding = "QA_CACHE"
id = "f6f784936aca4f6385888a7f290fa896"
preview_id = "qpilot-api-cache-prod"

[env.test]
name = "qpilot-api-test"
routes = [{ pattern = "test-api.qpilot.cbsdev.me", custom_domain = true }]

[env.test.vars]
LLM_PROVIDER = "groq"
GROQ_MODEL = "llama-3.3-70b-versatile"
GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions"
CACHE_TTL_SECONDS = "3600"
RATE_LIMIT_MAX = "500"
RATE_LIMIT_WINDOW_SECONDS = "60"
MAX_QUESTIONS_PER_CACHE = "200"
MAX_EXCLUSION_LIST_SIZE = "50"
MAX_LIMIT = "50"

[[env.test.kv_namespaces]]
binding = "QA_CACHE"
id = "b99171e224c447a585ae3afbce9967d1"
preview_id = "qpilot-api-cache-test"
